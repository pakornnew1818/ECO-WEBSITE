<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — ECO</title>
    <meta name="description" content="สมัครสมาชิกเพื่อเริ่มต้นการผจญภัยในโลก ECO">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { kanit: ['Kanit', 'sans-serif'] },
                    colors: {
                        gold: { light: '#fff3b0', DEFAULT: '#ffd700', dark: '#b8860b' },
                        dark: { DEFAULT: '#0a0c10', card: '#111827', panel: '#1a2029' }
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="bg-dark font-kanit min-h-screen flex items-center justify-center px-4 relative overflow-hidden">

    <!-- Ambient Glow Background -->
    <div
        class="absolute top-[-15%] left-[-5%] w-[450px] h-[450px] bg-gold/10 rounded-full blur-[140px] pointer-events-none">
    </div>
    <div
        class="absolute bottom-[-15%] right-[-5%] w-[350px] h-[350px] bg-gold-dark/10 rounded-full blur-[110px] pointer-events-none">
    </div>

    <!-- Floating Particles -->
    <div class="absolute top-16 right-20 w-2 h-2 bg-gold/30 rounded-full anim-float"></div>
    <div class="absolute bottom-24 left-16 w-1.5 h-1.5 bg-gold/20 rounded-full anim-float anim-delay-3"></div>
    <div class="absolute top-1/2 right-1/4 w-1 h-1 bg-gold/40 rounded-full anim-float anim-delay-5"></div>

    <div class="w-full max-w-md anim-fade-in-up">
        <!-- Card -->
        <div
            class="glass-panel rounded-3xl p-8 sm:p-10 shadow-2xl shadow-gold/5 hover:-translate-y-1 transition-transform duration-500">

            <!-- Logo -->
            <div class="text-center mb-8">
                <a href="/"
                    class="inline-block text-gold font-black text-3xl tracking-widest mb-1 hover:drop-shadow-[0_0_12px_rgba(255,215,0,0.5)] transition-all">ECO</a>
                <h1 class="text-2xl font-bold text-gold-gradient mt-2">REGISTER</h1>
                <p class="text-white/40 text-sm mt-1 uppercase tracking-widest">Create Your Legend</p>
                <div class="w-16 h-0.5 bg-gradient-to-r from-transparent via-gold/40 to-transparent mx-auto mt-4"></div>
            </div>

            <!-- Form -->
            <form id="registerForm" class="space-y-5">
                <div>
                    <label for="username" class="block text-sm font-semibold text-white/90 mb-2">Username</label>
                    <input type="text" id="username" name="username"
                        class="w-full px-4 py-3 bg-dark-card border border-white/10 rounded-xl text-white placeholder-white/30 focus:border-gold focus:ring-2 focus:ring-gold/20 outline-none transition-all duration-300"
                        placeholder="3-30 ตัวอักษร (a-z, 0-9)" required>
                </div>

                <div>
                    <label for="email" class="block text-sm font-semibold text-white/90 mb-2">Email Address</label>
                    <input type="email" id="email" name="email"
                        class="w-full px-4 py-3 bg-dark-card border border-white/10 rounded-xl text-white placeholder-white/30 focus:border-gold focus:ring-2 focus:ring-gold/20 outline-none transition-all duration-300"
                        placeholder="example@mail.com" required>
                </div>

                <div>
                    <label for="password" class="block text-sm font-semibold text-white/90 mb-2">Password</label>
                    <input type="password" id="password" name="password"
                        class="w-full px-4 py-3 bg-dark-card border border-white/10 rounded-xl text-white placeholder-white/30 focus:border-gold focus:ring-2 focus:ring-gold/20 outline-none transition-all duration-300"
                        placeholder="รหัสผ่าน 3-32 ตัวอักษร" required>
                </div>

                <button type="submit" id="submitBtn"
                    class="btn-gold-shimmer w-full py-3.5 rounded-xl text-black font-bold text-base tracking-wide shadow-lg shadow-gold/20 hover:shadow-gold/40 disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-300 mt-2">
                    สมัครสมาชิกตอนนี้
                </button>
            </form>

            <!-- Footer Links -->
            <div class="text-center mt-7">
                <p class="text-white/50 text-sm">
                    มีบัญชีแล้ว?
                    <a href="/pages/login.html"
                        class="text-gold font-semibold hover:underline hover:text-gold-light transition-colors">เข้าสู่ระบบ</a>
                </p>
            </div>
        </div>

        <!-- Back to Home -->
        <div class="text-center mt-6">
            <a href="/" class="text-white/30 text-xs hover:text-gold transition-colors">← กลับหน้าหลัก</a>
        </div>
    </div>

    <script src="/js/register.js"></script>
</body>

</html>
