<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — ECO</title>
    <meta name="description" content="เข้าสู่ระบบเพื่อเริ่มต้นการผจญภัยในโลก ECO">
    <!-- Anti-Flash: apply saved theme before first paint -->
    <script>if (localStorage.getItem('eco-theme') === 'dark') document.documentElement.classList.add('dark');</script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { kanit: ['Kanit', 'sans-serif'] },
                    colors: {
                        primary: {
                            DEFAULT: '#0058bc',
                            container: '#0070eb',
                            dim: '#adc6ff',
                            dark: '#004493',
                        },
                        tertiary: {
                            DEFAULT: '#9e3d00',
                            container: '#c64f00',
                        },
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="font-kanit min-h-screen eco-bg text-gray-900 dark:text-white flex items-center justify-center px-4 relative overflow-hidden">

    <!-- Background Orbs -->
    <div class="eco-orb eco-orb-1" aria-hidden="true"></div>
    <div class="eco-orb eco-orb-2" aria-hidden="true"></div>

    <!-- Floating Particles -->
    <div class="absolute top-20 left-20 w-2 h-2 bg-[#0058bc]/15 dark:bg-white/15 rounded-full anim-float" aria-hidden="true"></div>
    <div class="absolute top-40 right-32 w-1.5 h-1.5 bg-[#adc6ff]/40 dark:bg-[#adc6ff]/20 rounded-full anim-float anim-delay-2" aria-hidden="true"></div>
    <div class="absolute bottom-32 left-1/3 w-1 h-1 bg-[#0058bc]/20 dark:bg-white/25 rounded-full anim-float anim-delay-4" aria-hidden="true"></div>

    <!-- Theme Toggle (fixed top-right) -->
    <button onclick="toggleTheme()" id="themeToggleBtn"
        class="fixed top-4 right-4 z-50 theme-toggle" aria-label="Toggle theme">
        <!-- Sun icon (show in dark mode to switch to light) -->
        <svg id="iconSun" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"/>
        </svg>
        <!-- Moon icon (show in light mode to switch to dark) -->
        <svg id="iconMoon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>
    </button>

    <!-- Card -->
    <div class="w-full max-w-md relative z-10 anim-fade-in-up">
        <div class="eco-glass-strong rounded-3xl p-8 sm:p-10">

            <!-- Logo -->
            <div class="text-center mb-8">
                <a href="/"
                    class="inline-block font-black text-3xl tracking-widest mb-1
                           text-[#0058bc] dark:text-white
                           hover:text-[#0070eb] dark:hover:text-[#adc6ff]
                           transition-colors duration-300"
                    style="text-shadow: 0 0 24px rgba(0,112,235,0.25);">
                    ECO
                </a>
                <h1 class="text-2xl font-bold text-gray-900 dark:text-white mt-2">LOGIN</h1>
                <p class="text-gray-500 dark:text-white/45 text-sm mt-1 uppercase tracking-widest">Welcome back</p>
                <div class="w-16 h-px bg-gradient-to-r from-transparent via-[#0070eb]/50 to-transparent mx-auto mt-4"></div>
            </div>

            <!-- Form -->
            <form id="loginForm" class="space-y-5">

                <div>
                    <label for="username"
                        class="block text-sm font-semibold text-gray-700 dark:text-white/80 mb-2">
                        ชื่อผู้ใช้งาน (Username)
                    </label>
                    <input type="text" id="username" name="username"
                        class="w-full px-4 py-3 rounded-xl outline-none transition-all duration-300
                               text-gray-900 placeholder-gray-400
                               bg-gray-50 border border-gray-200
                               focus:border-[#0058bc] focus:ring-2 focus:ring-[#0058bc]/20
                               dark:text-white dark:placeholder-white/30
                               dark:bg-white/8 dark:border-white/15
                               dark:focus:border-[#0070eb] dark:focus:ring-[#0070eb]/25"
                        placeholder="กรอกชื่อผู้ใช้งาน" required autocomplete="username">
                </div>

                <div>
                    <label for="password"
                        class="block text-sm font-semibold text-gray-700 dark:text-white/80 mb-2">
                        รหัสผ่าน (Password)
                    </label>
                    <input type="password" id="password" name="password"
                        class="w-full px-4 py-3 rounded-xl outline-none transition-all duration-300
                               text-gray-900 placeholder-gray-400
                               bg-gray-50 border border-gray-200
                               focus:border-[#0058bc] focus:ring-2 focus:ring-[#0058bc]/20
                               dark:text-white dark:placeholder-white/30
                               dark:bg-white/8 dark:border-white/15
                               dark:focus:border-[#0070eb] dark:focus:ring-[#0070eb]/25"
                        placeholder="กรอกรหัสผ่าน" required autocomplete="current-password">
                </div>

                <button type="submit" id="btnSubmit"
                    class="w-full py-3.5 rounded-xl mt-2
                           bg-[#0070eb] hover:bg-[#0058bc] text-white font-bold text-base tracking-wide
                           shadow-[0_0_24px_rgba(0,112,235,0.35)] hover:shadow-[0_0_32px_rgba(0,112,235,0.55)]
                           hover:-translate-y-0.5 active:translate-y-0
                           disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none
                           transition-all duration-300">
                    เข้าสู่ระบบ
                </button>
            </form>

            <!-- Footer Link -->
            <div class="text-center mt-7">
                <p class="text-gray-500 dark:text-white/50 text-sm">
                    ยังไม่มีบัญชี?
                    <a href="/pages/register.html"
                        class="text-[#0058bc] dark:text-[#adc6ff] font-semibold
                               hover:text-[#0070eb] dark:hover:text-white transition-colors">
                        สมัครสมาชิกที่นี่
                    </a>
                </p>
            </div>
        </div>

        <!-- Back to Home -->
        <div class="text-center mt-6">
            <a href="/" class="text-gray-400 dark:text-white/35 text-xs hover:text-gray-700 dark:hover:text-white/70 transition-colors">
                ← กลับหน้าหลัก
            </a>
        </div>
    </div>

    <script>
        // ── Theme ─────────────────────────────────────────────────
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('eco-theme', isDark ? 'dark' : 'light');
            updateThemeIcons();
        }
        function updateThemeIcons() {
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('iconSun').classList.toggle('hidden', !isDark);
            document.getElementById('iconMoon').classList.toggle('hidden', isDark);
        }
        updateThemeIcons();

        // ── Login Form ─────────────────────────────────────────────
        const loginForm = document.getElementById('loginForm');
        const btnSubmit = document.getElementById('btnSubmit');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const loginData = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            btnSubmit.disabled = true;
            btnSubmit.innerText = 'กำลังตรวจสอบ...';

            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(loginData)
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    Swal.fire({
                        icon: 'success',
                        title: 'เข้าสู่ระบบสำเร็จ!',
                        text: `ยินดีต้อนรับคุณ ${data.user.username}`,
                        timer: 2000,
                        showConfirmButton: false,
                        background: '#001028',
                        color: '#fff'
                    }).then(() => { window.location.href = '/'; });
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'ล้มเหลว',
                        text: data.message || 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง',
                        confirmButtonColor: '#0070eb',
                        background: '#001028',
                        color: '#fff'
                    });
                }
            } catch (error) {
                Swal.fire({
                    icon: 'warning',
                    title: 'เชื่อมต่อล้มเหลว',
                    text: 'ไม่สามารถเชื่อมต่อกับ Server ได้ กรุณาลองใหม่ภายหลัง',
                    confirmButtonColor: '#0070eb',
                    background: '#001028',
                    color: '#fff'
                });
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerText = 'เข้าสู่ระบบ';
            }
        });
    </script>
</body>

</html>
